name: Match Watcher

on:
  push:
    paths:
      - 'public/app_data.json'
  workflow_dispatch: # Allow manual trigger

jobs:
  check-matches:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install axios

      - name: Run Watcher
        env:
          ONESIGNAL_REST_KEY: ${{ secrets.ONESIGNAL_REST_KEY }}
        run: node scripts/match-watcher.js

      - name: Commit State Changes
        run: |
          git config --global user.name "Match Watcher Bot"
          git config --global user.email "actions@github.com"
          git add .last_match_state.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update match state [skip ci]" && git push)
